# Core Jekyll Configuration
locale                : 'tr'
source                : 'jekyll'
destination           : 'html'
url                   : 'http://sercangezer.github.io'
enforce_ssl           : 'wsercangezer.github.io'
permalink             : '/:title'
include               : ['_pages']
plugins               : []

sass:
  style: compressed

compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: []
  ignore:
    envs: []
  blanklines: false
  profile: false
  startings: []

# Progressive Web App Settings
pwa_title             : 'Groveld'
pwa_themecolor        : '#1e88e5'
pwa_backgroundcolor   : '#1e88e5'

serviceworker         : true
google_analytics      : ''

